services:
  gateway:
    image: nginx:1.27-alpine
    container_name: wisd-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./ops/nginx-docker-template.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - backend
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wisd-backend
    restart: unless-stopped
    expose:
      - "3030"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - ./backend/data:/app/data
    environment:
      - TZ=${TZ}
      - SERVER_HOST=${BACKEND_SERVER_HOST}
      - SERVER_PORT=${BACKEND_SERVER_PORT}
      - SCREENSHOT_TIMEOUT_SEC=${SCREENSHOT_TIMEOUT_SEC}
      - WEB_ALLOWED_ORIGIN=${WEB_ALLOWED_ORIGIN}
      - WS_NAMESPACE=${WS_NAMESPACE}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL}

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${WEB_VITE_API_BASE_URL}
        - VITE_WS_BASE_URL=${WEB_VITE_WS_BASE_URL}
    container_name: wisd-web
    restart: unless-stopped
    expose:
      - "5173"
